<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plant Photo Verify</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:12px;background:#f4f4f4}
  h1{font-size:18px;color:#1a5c5c;margin:0 0 12px}
  .bar{display:flex;gap:8px;margin-bottom 12px;flex-wrap:wrap}
  .bar input{flex:1;min-width:180px;padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px}
  .bar button{padding:8px 16px;background:#1a5c5c;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px}
  .bar button.off{background:#999}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .card .imgs{display:flex;gap:2px;background:#000;height:140px}
  .card .imgs img{width:100%;height:140px;object-fit:cover;flex:1;cursor:pointer}
  .card .info{padding:8px 10px}
  .card .botanical{font-weight:600;font-size:13px;color:#222}
  .card .common{font-size:11px;color:#666;margin-top:2px}
  .card .count{font-size:10px;color:#999;margin-top:4px}
  .card.ok .botanical{color:#1a5c5c}
  .card.missing .imgs{background:#fdd}
  .card.missing .info{background:#fff0f0}
  .card.missing .botanical{color:#c00}
  .modal{display:none;position:fixed;inset:0;background:#000d;z-index:999;padding:20px;align-items:center;justify-content:center;flex-direction:column}
  .modal.active{display:flex}
  .modal img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px}
  .modal .close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;line-height:1}
  .modal label{display:block;color:#fff;margin-top:10px;font-size:14px;text-align:center}
  .stat{font-size:12px;color:#666;margin-bottom:8px}
</style>
</head>
<body>
<h1>🌿 Plant Photo Verify</h1>
<div class="bar">
  <input id="search" placeholder="Search plants..." oninput="render()"/>
  <button id="all" onclick="showAll=!showAll;render()">Show all</button>
</div>
<div class="stat" id="stat"></div>
<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <span class="close" onclick="modalClose()">×</span>
  <img id="mimg" src="" alt=""/>
  <label id="mlabel"></label>
</div>

<script src="plants.js"></script>
<script>
const $ = id => document.getElementById(id);
let showAll = false;

function render() {
  const q = $('search').value.toLowerCase().trim();
  let list = PLANTS;
  if (q) list = list.filter(p => p.botanical.toLowerCase().includes(q) || (p.common||'').toLowerCase().includes(q));
  if (!showAll) list = list.filter(p => p.images && p.images.length > 0);

  $('stat').textContent = `Showing ${list.length} of ${PLANTS.length} plants — ${PLANTS.filter(p=>p.images&&p.images.length).length} with photos`;

  $('grid').innerHTML = list.map((p,i) => `
    <div class="card ${p.images&&p.images.length?'ok':'missing'}" onclick="openImg(${i})">
      <div class="imgs">${(p.images||[]).map((img,j) => `<img src="${img}" alt="${p.botanical}" loading="lazy"/>`).join('')}</div>
      <div class="info">
        <div class="botanical">${p.botanical}</div>
        <div class="common">${p.common||''}</div>
        <div class="count">${p.images?p.images.length:0} photo${p.images&&p.images.length!==1?'s':''}</div>
      </div>
    </div>
  `).join('');
}

function openImg(idx) {
  const p = PLANTS[idx];
  if (!p.images || !p.images.length) return;
  $('mimg').src = p.images[0];
  $('mlabel').textContent = p.botanical + (p.common ? ' — ' + p.common : '');
  $('modal').classList.add('active');
}
function modalClose() { $('modal').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') modalClose(); });

render();
</script>
</body>
</html>
